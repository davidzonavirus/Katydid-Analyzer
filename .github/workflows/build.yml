# Build Katydid Analyzer executables for Mac and Windows
# Run manually or on push - artifacts can be downloaded from the Actions tab

name: Build Executables

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - '.gitignore'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Mac apps
        run: python build.py

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-apps
          path: release/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows executables
        run: python build.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/
